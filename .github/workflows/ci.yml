name: CI

# Trunk-based: validação roda em todo PR para main (e no push para main após o merge).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Valida padrão do projeto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Instala dependências do CLI
        working-directory: cli
        run: npm ci

      - name: Testes do CLI + cobertura (>= 90%)
        working-directory: cli
        run: npm run test:coverage

      - name: Testes das skills
        run: |
          for dir in skills/*/test; do
            if [ -d "$dir" ]; then
              echo "== $dir =="
              node --test "$dir"/*.test.mjs
            fi
          done

      - name: Padrão de skills (nenhum nome duplicado)
        run: node scripts/check-skill-names.mjs

      - name: Gate de rastreabilidade SDD
        run: node skills/sdd-harness-creator/scripts/check-traceability.mjs --target .
